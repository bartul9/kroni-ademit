        // --- Carousel state/refs ---
        const trackRef = React.useRef(null);
        const [active, setActive] = React.useState(0); // index in "rest"
        const [itemW, setItemW] = React.useState(0);
        const GAP = 12; // px, keep in sync with Tailwind gap-3

        // Measure card width responsively
        const measure = React.useCallback(() => {
          const el = trackRef.current;
          if (!el || !el.firstChild) return;
          setItemW(el.firstChild.getBoundingClientRect().width);
        }, []);

        React.useEffect(() => {
          measure();
          const onResize = () => measure();
          window.addEventListener("resize", onResize);
          return () => window.removeEventListener("resize", onResize);
        }, [measure]);

        // Derive active index on scroll
        const onScroll = React.useCallback(() => {
          const el = trackRef.current;
          if (!el || !itemW) return;
          const raw = el.scrollLeft / (itemW + GAP);
          setActive(Math.round(raw));
        }, [itemW]);

        React.useEffect(() => {
          const el = trackRef.current;
          if (!el) return;
          el.addEventListener("scroll", onScroll, { passive: true });
          return () => el.removeEventListener("scroll", onScroll);
        }, [onScroll]);

        // Helpers
        const scrollToIndex = (i) => {
          const el = trackRef.current;
          if (!el || !itemW) return;
          const clamped = Math.max(0, Math.min(rest.length - 1, i));
          el.scrollTo({
            left: clamped * (itemW + GAP),
            behavior: "smooth",
          });
        };

        const next = () => scrollToIndex(active + 1);
        const prev = () => scrollToIndex(active - 1);

        // Keyboard arrows
        React.useEffect(() => {
          const onKey = (e) => {
            if (e.key === "ArrowRight") next();
            if (e.key === "ArrowLeft") prev();
          };
          window.addEventListener("keydown", onKey);
          return () => window.removeEventListener("keydown", onKey);
        });

              <h2 className="h1 text-3xl md:text-4xl text-stone-900 text-center">
                {t.galleryTitle}
              </h2>
              <p className="mt-3 text-stone-600 text-center">{t.gallerySub}</p>

              {/* Top feature images */}
              <div className="mt-10 grid md:grid-cols-3 gap-4">
                {first.map((src) => (
                  <img
                    key={src}
                    src={src}
                    alt="Gallery"
                    className="rounded-xl h-64 w-full object-cover transition-transform duration-300 hover:scale-[1.03]"
                  />
                ))}
              </div>

              {/* Carousel */}
              <div className="mt-10 relative">
                {/* Fade edges */}
                <div className="pointer-events-none absolute inset-y-0 left-0 w-16 bg-gradient-to-r from-white to-transparent"></div>
                <div className="pointer-events-none absolute inset-y-0 right-0 w-16 bg-gradient-to-l from-white to-transparent"></div>

                {/* Track */}
                <div
                  ref={trackRef}
                  className="
              overflow-x-auto scroll-smooth snap-x snap-mandatory
              [scrollbar-width:none] [&::-webkit-scrollbar]:hidden
              "
                  style={{ scrollPaddingLeft: "12px" }}
                >
                  <div className="flex gap-3 px-3">
                    {rest.map((src, i) => (
                      <div
                        key={src}
                        className="
                    snap-center flex-none
                    transition-transform duration-300
                  "
                        style={{
                          // Card width: responsive and modern
                          width: "clamp(220px, 36vw, 340px)",
                        }}
                      >
                        <img
                          src={src}
                          alt="Gallery"
                          className={`
                      rounded-2xl h-48 w-full object-cover
                      shadow-sm
                      transition-all duration-300
                      ${
                        i === active
                          ? "scale-[1.03] shadow-lg"
                          : "opacity-90 hover:opacity-100 hover:scale-[1.02]"
                      }
                    `}
                        />
                      </div>
                    ))}
                  </div>
                </div>

                {/* Arrows */}
                {active > 0 && (
                  <button
                    onClick={prev}
                    className="absolute left-2 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white shadow-lg rounded-full p-2 md:p-3"
                    aria-label="Previous"
                  >
                    <svg
                      viewBox="0 0 24 24"
                      className="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                    >
                      <path
                        d="M15 18l-6-6 6-6"
                        strokeWidth="1.8"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                      />
                    </svg>
                  </button>
                )}

                {active < rest.length - 2 && (
                  <button
                    onClick={next}
                    className="absolute right-2 top-1/2 -translate-y-1/2 bg-white/90 hover:bg-white shadow-lg rounded-full p-2 md:p-3"
                    aria-label="Next"
                  >
                    <svg
                      viewBox="0 0 24 24"
                      className="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                    >
                      <path
                        d="M9 6l6 6-6 6"
                        strokeWidth="1.8"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                      />
                    </svg>
                  </button>
                )}
              </div>
            </div>
          </section>
        );
      };

      const MenuTeaser = ({ t }) => (
        <section
          id="menu"
          className="py-20 bg-gradient-to-b from-slate-50 to-white"
        >
          <div className="max-w-6xl mx-auto px-4 grid md:grid-cols-2 gap-10 items-center">
            <div className="rounded-2xl overflow-hidden shadow-lg">
              <img
                src="images/slika3.jpg"
                alt="Village-style mixed grill platter"
                className="w-full h-[360px] object-cover"
              />
            </div>
            <div>
              <h2 className="h1 text-3xl md:text-4xl text-stone-900">
                {t.menuTitle}
              </h2>
              <p className="mt-4 text-stone-700">{t.menuBody}</p>
              <ul className="mt-4 space-y-2 text-stone-700">
                {t.menuItems.map((item) => (
                  <li key={item}>• {item}</li>
                ))}
              </ul>
            </div>
          </div>
        </section>
      );

      const Location = ({ t }) => (
        <section id="location" className="py-20">
          <div className="max-w-6xl mx-auto px-4">
            <h2 className="h1 text-3xl md:text-4xl text-stone-900 text-center">
              {t.find}
            </h2>
            <p className="mt-3 text-stone-600 text-center">{t.findSub}</p>
            <div className="mt-8 grid lg:grid-cols-2 gap-6">
              <div className="rounded-2xl overflow-hidden border border-stone-200">
                {/* If you have the exact Maps link, send it and I'll swap it in */}
                <iframe
                  title="Tebaca Adem Map"
                  src="https://www.google.com/maps?q=Te%20Baca%20Adem%20Kuqic%C3%AB%20Sk%C3%ABnderaj&output=embed&z=11"
                  className="w-full h-[380px]"
                  loading="lazy"
                  referrerPolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
              <div className="p-6 rounded-2xl border border-stone-200 bg-white">
                <h3 className="font-bold text-xl text-stone-900">
                  {t.addressTitle}
                </h3>
                <p
                  className="mt-3 text-stone-700"
                  style={{ whiteSpace: "pre-line" }}
                >
                  {t.addressText}
                </p>
                <div className="mt-4 grid sm:grid-cols-2 gap-3">
                  <a
                    href="https://www.google.com/maps?q=Te%20Baca%20Adem%20Kuqic%C3%AB%20Sk%C3%ABnderaj"
                    target="_blank"
                    className="inline-flex items-center justify-center gap-2 px-4 py-3 rounded-xl border border-stone-200 hover:border-brand-400"
                  >
                    <svg
                      className="w-5 h-5"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                    >
                      <path
                        strokeWidth="1.5"
                        d="M12 21s-6.75-6.223-6.75-11.25A6.75 6.75 0 1 1 18.75 9.75C18.75 14.777 12 21 12 21Z"
                      />
                      <circle cx="12" cy="9.75" r="2.25" strokeWidth="1.5" />
                    </svg>
                    {t.openMaps}
                  </a>
                  <a
                    href="#contact"
                    className="inline-flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-brand-500 text-white hover:opacity-90"
                  >
                    {t.contactUs}
                  </a>
                </div>
                <div className="mt-4 text-stone-700">
                  <p>
                    <strong>{t.openHours}</strong>
                  </p>
                </div>
              </div>
            </div>
          </div>
        </section>
      );

      const Contact = ({ t }) => (
        <section id="contact" className="py-20 bg-slate-50">
          <div className="max-w-6xl mx-auto px-4">
            <div className="rounded-2xl border border-stone-200 bg-white p-8 md:p-10">
              <div className="grid md:grid-cols-2 gap-10">
                <div>
                  <h2 className="h1 text-3xl md:text-4xl text-stone-900">
                    {t.contactTitle}
                  </h2>
                  <p className="mt-4 text-stone-700">{t.contactLead}</p>
                  <div className="mt-6 space-y-3">
                    <a
                      href="tel:+38300000000"
                      className="flex items-center gap-3 text-stone-800 hover:text-brand-600"
                    >
                      {Icon.phone("w-5 h-5")}
                      <span>{t.phoneLabel}</span>
                    </a>
                    <a
                      href="mailto:info@tebacaadem.com"
                      className="flex items-center gap-3 text-stone-800 hover:text-brand-600"
                    >
                      {Icon.mail("w-5 h-5")}
                      <span>{t.emailLabel}</span>
                    </a>
                  </div>
                </div>
                <form
                  action="mailto:info@tebacaadem.com"
                  method="post"
                  className="grid grid-cols-1 gap-4"
                >
                  <input
                    className="px-4 py-3 rounded-xl border border-stone-300"
                    placeholder={t.formName}
                    required
                  />
                  <input
                    type="email"
                    className="px-4 py-3 rounded-xl border border-stone-300"
                    placeholder={t.formEmail}
                    required
                  />
                  <input
                    className="px-4 py-3 rounded-xl border border-stone-300"
                    placeholder={t.formPhone}
                  />
                  <textarea
                    rows="5"
                    className="px-4 py-3 rounded-xl border border-stone-300"
                    placeholder={t.formMsg}
                  ></textarea>
                  <button className="mt-2 px-5 py-3 rounded-xl bg-brand-500 text-white font-semibold hover:opacity-90">
                    {t.formSend}
                  </button>
                </form>
              </div>
            </div>
          </div>
        </section>
      );

      const LanguageDropdown = ({ lang, setLang }) => {
        const [open, setOpen] = React.useState(false);
        const opts = [
          { code: "sq", label: "Shqip", flag: "fi fi-al" },
          { code: "hr", label: "Hrvatski", flag: "fi fi-hr" },
          { code: "en", label: "English", flag: "fi fi-gb" },
        ];
        const current = opts.find((o) => o.code === lang) || opts[0];

        const choose = (code) => {
          setLang(code);
          localStorage.setItem("lang", code);
          const url = new URL(window.location.href);
          url.searchParams.set("lang", code);
          history.replaceState({}, "", url.toString());
          setOpen(false);
        };

        React.useEffect(() => {
          const onClick = (e) => {
            if (!e.target.closest?.("#lang-dd")) setOpen(false);
          };
          window.addEventListener("click", onClick);
          return () => window.removeEventListener("click", onClick);
        }, []);

        return (
          <div id="lang-dd" className="relative">
            <button
              onClick={() => setOpen((v) => !v)}
              className="flag-btn inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-stone-300 bg-white text-sm hover:border-brand-500"
              aria-haspopup="listbox"
              aria-expanded={open}
              title="Language"
            >
              <span className={current.flag}></span>
              <svg
                className="w-4 h-4 opacity-70"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path strokeWidth="1.5" d="M6 9l6 6 6-6" />
              </svg>
            </button>
            {open && (
              <ul
                role="listbox"
                className="absolute right-0 mt-2 w-35 rounded-xl border border-stone-200 bg-white shadow-lg z-50 overflow-hidden"
              >
                {opts.map((o) => (
                  <li key={o.code}>
                    <button
                      role="option"
                      aria-selected={o.code === lang}
                      onClick={() => choose(o.code)}
                      className={`w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-stone-50 ${
                        o.code === lang ? "bg-stone-50" : ""
                      }`}
                    >
                      <span className={o.flag}></span>
                      <span>{o.label}</span>
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      };

      const Footer = () => (
        <footer className="py-10 border-t border-black/5">
          <div className="max-w-6xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-stone-600">
            <p>© {new Date().getFullYear()} Tebaca Adem — Skënderaj</p>
          </div>
        </footer>
      );

      const App = () => {
        const [lang, setLang] = React.useState(getInitialLang());
        const t = T[lang];
        React.useEffect(() => {
          localStorage.setItem("lang", lang);
          const url = new URL(window.location.href);
          url.searchParams.set("lang", lang);
          history.replaceState({}, "", url.toString());
        }, [lang]);

        return (
          <>
            <Nav t={t} lang={lang} setLang={setLang} />
            <Hero t={t} />
            <About t={t} />
            <Services t={t} />
            <Gallery t={t} />
            <MenuTeaser t={t} />
            <Location t={t} />
            <Contact t={t} />
            <Footer />
          </>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
