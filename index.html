          <div className="relative max-w-7xl mx-auto px-4 text-slate-100">
            <div className="grid items-center gap-12 lg:grid-cols-[0.85fr,1.15fr]">
              <div className="order-2 lg:order-1">
                <div className="rounded-[36px] border border-white/15 bg-white/10 p-8 sm:p-10 shadow-2xl shadow-black/40 backdrop-blur">
                  <h2 className="h1 text-3xl text-white sm:text-4xl">{t.contactTitle}</h2>
                  <p className="mt-5 text-base text-slate-300 sm:text-lg">{t.contactLead}</p>
                  <div className="mt-8 space-y-4">
                    <a
                      href={toTelHref(t.phoneLabel)}
                      className="group flex items-center gap-3 rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-sm font-semibold text-slate-100 transition hover:border-white/30 hover:bg-white/20"
                    >
                      <span className="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-brand-500/20 text-brand-200">
                        {Icon.phone("w-5 h-5")}
                      </span>
                      {t.phoneLabel}
                    </a>
                    <a
                      href="mailto:info@tebacaadem.com"
                      className="group flex items-center gap-3 rounded-2xl border border-white/10 bg-white/10 px-4 py-3 text-sm font-semibold text-slate-100 transition hover:border-white/30 hover:bg-white/20"
                    >
                      <span className="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-brand-500/20 text-brand-200">
                        {Icon.mail("w-5 h-5")}
                      </span>
                      {t.emailLabel}
                    </a>
                  </div>
                  <div className="mt-8 rounded-2xl border border-white/15 bg-white/10 p-4 text-sm text-slate-200 shadow-brand-500/10">
                    <div className="flex items-center gap-3 font-semibold text-slate-100">
                      {Icon.calendar("w-4 h-4")}
                      {t.openHours}
                    </div>
                  </div>
                </div>
              </div>
              <form
                action="mailto:info@tebacaadem.com"
                method="post"
                className="order-1 rounded-[36px] border border-white/10 bg-white p-8 shadow-2xl shadow-black/30 backdrop-blur lg:order-2"
              >
                <div className="grid gap-4">
                  <div className="grid gap-4 sm:grid-cols-2">
                    <input
                      className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-stone-800 shadow-sm transition focus:border-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-200"
                      placeholder={t.formName}
                      required
                    />
                    <input
                      type="email"
                      className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-stone-800 shadow-sm transition focus:border-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-200"
                      placeholder={t.formEmail}
                      required
                    />
                  </div>
                  <input
                    className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-stone-800 shadow-sm transition focus:border-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-200"
                    placeholder={t.formPhone}
                  />
                  <textarea
                    rows="5"
                    className="w-full rounded-2xl border border-stone-200 px-4 py-3 text-stone-800 shadow-sm transition focus:border-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-200"
                    placeholder={t.formMsg}
                  ></textarea>
                  <button className="mt-2 inline-flex items-center justify-center gap-2 rounded-full bg-stone-900 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-500/20 transition hover:-translate-y-0.5 hover:bg-brand-600">
                    {t.formSend}
                    {Icon.arrow("w-4 h-4")}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>
      );

      const LanguageDropdown = ({ lang, setLang }) => {
        const [open, setOpen] = React.useState(false);
        const opts = [
          { code: "sq", label: "Shqip", flag: "fi fi-al" },
          { code: "hr", label: "Hrvatski", flag: "fi fi-hr" },
          { code: "en", label: "English", flag: "fi fi-gb" },
        ];
        const current = opts.find((o) => o.code === lang) || opts[0];

        const choose = (code) => {
          setLang(code);
          localStorage.setItem("lang", code);
          const url = new URL(window.location.href);
          url.searchParams.set("lang", code);
          history.replaceState({}, "", url.toString());
          setOpen(false);
        };

        React.useEffect(() => {
          const onClick = (e) => {
            if (!e.target.closest?.("#lang-dd")) setOpen(false);
          };
          window.addEventListener("click", onClick);
          return () => window.removeEventListener("click", onClick);
        }, []);

        return (
          <div id="lang-dd" className="relative">
            <button
              onClick={() => setOpen((v) => !v)}
              className="flag-btn inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-stone-300 bg-white text-sm hover:border-brand-500"
              aria-haspopup="listbox"
              aria-expanded={open}
              title="Language"
            >
              <span className={current.flag}></span>
              <svg
                className="w-4 h-4 opacity-70"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path strokeWidth="1.5" d="M6 9l6 6 6-6" />
              </svg>
            </button>
            {open && (
              <ul
                role="listbox"
                className="absolute right-0 mt-2 w-35 rounded-xl border border-stone-200 bg-white shadow-lg z-50 overflow-hidden"
              >
                {opts.map((o) => (
                  <li key={o.code}>
                    <button
                      role="option"
                      aria-selected={o.code === lang}
                      onClick={() => choose(o.code)}
                      className={`w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-stone-50 ${
                        o.code === lang ? "bg-stone-50" : ""
                      }`}
                    >
                      <span className={o.flag}></span>
                      <span>{o.label}</span>
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      };

      const Footer = ({ t }) => (
        <footer className="bg-black py-12 text-slate-400">
          <div className="max-w-7xl mx-auto flex flex-col gap-6 px-4 text-sm md:flex-row md:items-center md:justify-between">
            <div>
              <div className="h1 text-lg text-white">{BRAND}</div>
              <p className="mt-2 max-w-sm text-slate-500">{t.findSub}</p>
            </div>
            <div className="flex flex-wrap items-center gap-4 text-slate-500">
              <a href="#about" className="transition hover:text-white">
                {t.nav.about}
              </a>
              <a href="#services" className="transition hover:text-white">
                {t.nav.services}
              </a>
              <a href="#gallery" className="transition hover:text-white">
                {t.nav.gallery}
              </a>
              <a href="#menu" className="transition hover:text-white">
                {t.nav.menu}
              </a>
              <a href="#location" className="transition hover:text-white">
                {t.nav.location}
              </a>
            </div>
            <div className="flex flex-col items-start gap-2 text-slate-500">
              <a href={toTelHref(t.phoneLabel)} className="inline-flex items-center gap-2 text-white transition hover:text-brand-300">
                {Icon.phone("w-4 h-4")}
                {t.phoneLabel}
              </a>
              <span>© {new Date().getFullYear()} {BRAND}</span>
            </div>
          </div>
        </footer>
      );

      const App = () => {
        const [lang, setLang] = React.useState(getInitialLang());
        const t = T[lang];
        React.useEffect(() => {
          localStorage.setItem("lang", lang);
          const url = new URL(window.location.href);
          url.searchParams.set("lang", lang);
          history.replaceState({}, "", url.toString());
        }, [lang]);

        return (
          <>
            <Nav t={t} lang={lang} setLang={setLang} />
            <Hero t={t} />
            <About t={t} />
            <Services t={t} />
            <Gallery t={t} />
            <MenuTeaser t={t} />
            <Location t={t} />
            <Contact t={t} />
            <Footer t={t} />
          </>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
