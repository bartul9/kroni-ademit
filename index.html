      const LanguageDropdown = ({ lang, setLang }) => {
        const [open, setOpen] = React.useState(false);
        const opts = [
          { code: "sq", label: "Shqip", flag: "fi fi-al" },
          { code: "hr", label: "Hrvatski", flag: "fi fi-hr" },
          { code: "en", label: "English", flag: "fi fi-gb" },
        ];
        const current = opts.find((o) => o.code === lang) || opts[0];

        const choose = (code) => {
          setLang(code);
          localStorage.setItem("lang", code);
          const url = new URL(window.location.href);
          url.searchParams.set("lang", code);
          history.replaceState({}, "", url.toString());
          setOpen(false);
        };

        React.useEffect(() => {
          const onClick = (e) => {
            if (!e.target.closest?.("#lang-dd")) setOpen(false);
          };
          window.addEventListener("click", onClick);
          return () => window.removeEventListener("click", onClick);
        }, []);

        return (
          <div id="lang-dd" className="relative">
            <button
              onClick={() => setOpen((v) => !v)}
              className="flag-btn inline-flex items-center gap-2 rounded-full border border-white/15 bg-white/10 px-3 py-2 text-sm text-slate-100 transition hover:border-brand-400 hover:text-brand-200"
              aria-haspopup="listbox"
              aria-expanded={open}
              title="Language"
            >
              <span className={current.flag}></span>
              <svg
                className="h-4 w-4 opacity-70"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
              >
                <path strokeWidth="1.5" d="M6 9l6 6 6-6" />
              </svg>
            </button>
            {open && (
              <ul
                role="listbox"
                className="absolute right-0 z-50 mt-2 w-40 overflow-hidden rounded-2xl border border-white/10 bg-slate-900/90 backdrop-blur"
              >
                {opts.map((o) => (
                  <li key={o.code}>
                    <button
                      role="option"
                      aria-selected={o.code === lang}
                      onClick={() => choose(o.code)}
                      className={`flex w-full items-center gap-2 px-3 py-2 text-sm transition ${
                        o.code === lang
                          ? "bg-white/10 text-brand-200"
                          : "text-slate-200 hover:bg-white/5 hover:text-brand-200"
                      }`}
                    >
                      <span className={o.flag}></span>
                      <span>{o.label}</span>
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      };
